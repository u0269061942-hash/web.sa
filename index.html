<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buscador de Fotos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--bg2:#16161b;--bg3:#1e1e26;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.18);
  --gold:#e8c87a;--amber:#c4a45a;--purple:#a78bfa;
  --text:#f0ede8;--muted:#7a7880;--muted2:#3e3d4a;
  --green:#6fcf8a;--r:10px;--rl:16px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-weight:300;min-height:100vh}
header{padding:2.5rem 2rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
.badge{display:inline-flex;background:rgba(232,200,122,0.09);border:1px solid rgba(232,200,122,0.22);border-radius:100px;padding:4px 14px;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1.1;letter-spacing:-.02em;margin-bottom:.5rem}
h1 em{font-style:italic;color:var(--gold)}
.sub{font-size:.9rem;color:var(--muted);max-width:520px;margin:0 auto}
main{max-width:960px;margin:0 auto;padding:2rem}
.lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;display:flex;justify-content:space-between}
#cnt{color:var(--gold)}
textarea{width:100%;height:200px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;font-family:'DM Sans',system-ui,sans-serif;font-size:.9rem;color:var(--text);outline:none;resize:vertical;line-height:1.9;margin-bottom:1rem}
textarea::placeholder{color:var(--muted2)}
textarea:focus{border-color:rgba(232,200,122,.4)}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:2rem;align-items:center}
.btn{height:44px;padding:0 22px;border-radius:var(--r);font-family:'DM Sans',system-ui,sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;text-decoration:none;border:none}
.gold{background:var(--gold);color:#0d0d0f}.gold:hover{background:#f0d48c}.gold:disabled{background:var(--muted2);cursor:not-allowed}
.amber{background:var(--amber);color:#0d0d0f}.amber:hover{background:#d4b46a}.amber:disabled{background:var(--muted2);cursor:not-allowed}
.ghost{background:transparent;color:var(--text);border:1px solid var(--border2)}.ghost:hover{background:var(--bg3)}
.sp{flex:1}
.prog{display:none;margin-bottom:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem}
.prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.prog-bar{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:99px;transition:width .5s;width:0}
.prog-fill.ai{background:var(--purple)}
.prog-msg{font-size:13px;margin-top:10px;min-height:20px}
.prog-msg.ai{color:var(--purple);font-weight:500}
.prog-msg.ok{color:var(--green)}
.prog-src{font-size:11px;color:var(--muted2);margin-top:4px;min-height:16px}
.exp-box{display:none;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:1.4rem;margin-bottom:2rem}
.exp-box.on{display:block}
.exp-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.7rem}
.exp-ta{width:100%;height:160px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-family:'Courier New',monospace;font-size:11px;color:var(--muted);resize:vertical;outline:none;line-height:1.6}
.exp-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.results{display:none}.results.on{display:block}
/* CARD grande — una sola imagen por término */
.item{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:1.5rem;animation:up .35s ease both}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.item.ai-item{border-color:rgba(167,139,250,0.3)}
@media(max-width:640px){.item{grid-template-columns:1fr}}
.item-img{position:relative;aspect-ratio:4/3;background:var(--bg3);overflow:hidden}
.item-img img{width:100%;height:100%;object-fit:cover;display:block}
/* Placeholder animado mientras genera */
.item-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:1rem;background:linear-gradient(135deg,#1a1824,#1e1a2e);min-height:200px}
.ph-spin{width:40px;height:40px;border:3px solid rgba(167,139,250,0.1);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ph-name{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--text);text-align:center}
.ph-status{font-size:11px;color:var(--purple);text-align:center;animation:blink 1.4s ease-in-out infinite}
.ph-source{font-size:10px;color:var(--muted2);text-align:center}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.src-tag{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.7);color:#ccc;font-size:10px;padding:3px 8px;border-radius:99px;backdrop-filter:blur(4px)}
.ai-tag{position:absolute;bottom:8px;right:8px;background:rgba(110,80,220,0.9);color:#fff;font-size:10px;font-weight:500;padding:3px 8px;border-radius:99px}
.item-info{padding:1.2rem;display:flex;flex-direction:column;gap:10px;justify-content:center}
.item-term{font-family:'Playfair Display',serif;font-style:italic;font-size:1.2rem;color:var(--text)}
.item-credit{font-size:11px;color:var(--muted2)}
.field-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px}
.field-lbl{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.field-val{font-family:'Courier New',monospace;font-size:10px;color:var(--muted);word-break:break-all;line-height:1.4}
.item-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.item-btns .btn{height:36px;font-size:.78rem;padding:0 14px;flex:1}
.cbtn-sm{background:var(--bg);border:1px solid var(--border2);border-radius:5px;padding:3px 10px;font-size:10px;font-weight:500;color:var(--text);cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;transition:all .15s;flex-shrink:0}
.cbtn-sm:hover{border-color:var(--amber)}.cbtn-sm.ok{border-color:var(--green);color:var(--green)}
.url-row{display:flex;align-items:center;gap:6px}
.url-val{font-family:'Courier New',monospace;font-size:10px;color:var(--muted);word-break:break-all;flex:1;line-height:1.4}
footer{border-top:1px solid var(--border);padding:1.2rem 2rem;text-align:center;font-size:11px;color:var(--muted2);margin-top:2rem}
.exp-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
</style>
</head>
<body>
<header>
  <div class="badge">&#9889; Unsplash + IA — 1 imagen exacta por término</div>
  <h1>Fotos listas para<br><em>tu web</em></h1>
  <p class="sub">Una imagen exacta por cada nombre. Si no la encuentra, la IA la crea. Descarga en .PNG o .JPG.</p>
</header>
<main>
  <div class="lbl"><span>Términos &#8212; uno por línea (máx. 20)</span><span><span id="cnt">0</span>/20</span></div>
  <textarea id="ta" placeholder="superman&#10;dragon de fuego&#10;ciudad cyberpunk&#10;gato blanco&#10;puesta de sol&#10;...hasta 20 términos"></textarea>
  <div class="row">
    <button class="btn gold" id="searchBtn" onclick="startSearch()">&#128269; Buscar</button>
    <button class="btn ghost" onclick="clearAll()">&#128465; Limpiar</button>
    <div class="sp"></div>
    <button class="btn ghost" id="expBtn" style="display:none" onclick="toggleExp()">&#8595; Ver URLs</button>
  </div>
  <div class="prog" id="prog">
    <div class="prog-top"><span id="pLbl">0 de 0</span><span id="pPct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="pFill"></div></div>
    <div class="prog-msg" id="pMsg">Iniciando...</div>
    <div class="prog-src" id="pSrc"></div>
  </div>
  <div class="exp-box" id="expBox">
    <div class="exp-lbl">URLs encontradas</div>
    <textarea class="exp-ta" id="expTa" readonly></textarea>
    <div class="exp-row">
      <button class="btn ghost" onclick="copyUrls()">&#128203; Copiar URLs</button>
      <button class="btn gold" id="btnAllPng" onclick="dlAll('png')">&#8595; Descargas .PNG</button>
      <button class="btn amber" id="btnAllJpg" onclick="dlAll('jpg')">&#8595; Descargas .JPG</button>
    </div>
  </div>
  <div class="results" id="results"></div>
</main>
<footer>Buscador &#8212; Unsplash + Pollinations AI + Lexica AI</footer>

<script>
const UKEY='2G8xFmc1jV0VWZg4zo6VeoV5yYj5Rf5S8mtuJ9VWai8';
const ta=document.getElementById('ta');
ta.addEventListener('input',updateCount);
function updateCount(){document.getElementById('cnt').textContent=Math.min(getTerms().length,20);}
function getTerms(){return ta.value.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,20);}
let allResults=[],busy=false;

function clearAll(){
  ta.value='';updateCount();
  document.getElementById('results').innerHTML='';
  document.getElementById('results').classList.remove('on');
  document.getElementById('expBox').classList.remove('on');
  document.getElementById('expBtn').style.display='none';
  document.getElementById('prog').style.display='none';
  allResults=[];
}

async function startSearch(){
  if(busy)return;
  const terms=getTerms();
  if(!terms.length){alert('Escribe al menos un término');return;}
  busy=true;allResults=[];
  const btn=document.getElementById('searchBtn');
  btn.disabled=true;btn.textContent='Buscando...';
  document.getElementById('expBtn').style.display='none';
  document.getElementById('expBox').classList.remove('on');
  document.getElementById('results').innerHTML='';
  document.getElementById('results').classList.add('on');
  document.getElementById('prog').style.display='block';

  for(let i=0;i<terms.length;i++){
    const term=terms[i];
    setProg(i,terms.length,'&#128269; Buscando "'+term+'" en Unsplash...',false,'');

    // Crear el item con placeholder inmediatamente
    const itemEl=addItem(term,i,null);

    // Buscar en Unsplash primero
    let photo=await searchUnsplash(term);

    if(!photo){
      // No encontrado — crear con IA sin timeout — espera lo que haga falta
      setProg(i,terms.length,'✨ Creando imagen de "'+term+'" con IA...',true,'Conectando con Pollinations AI...');
      updateItemStatus(itemEl,'✨ Creando con IA...','Conectando con Pollinations AI...');

      photo=await generateAI(term,i,function(msg,src){
        setProg(i,terms.length,'✨ Creando "'+term+'"...',true,msg);
        updateItemStatus(itemEl,'✨ '+msg,src||'');
      });
    }

    // Mostrar imagen en el item
    showItemImage(itemEl,photo);
    allResults.push({term,photo});
    setProg(i+1,terms.length,(photo.isAI?'✨ IA lista':'✓ Encontrada')+': "'+term+'"',photo.isAI,photo.source);
  }

  document.getElementById('prog').style.display='none';
  busy=false;btn.disabled=false;btn.textContent='🔍 Buscar';
  document.getElementById('expBtn').style.display='flex';
  buildExport();
}

function setProg(done,total,msg,isAI,src){
  const pct=total?Math.round(done/total*100):0;
  const fill=document.getElementById('pFill');
  fill.style.width=pct+'%';fill.className='prog-fill'+(isAI?' ai':'');
  document.getElementById('pPct').textContent=pct+'%';
  document.getElementById('pLbl').textContent=done+' de '+total+' términos';
  const m=document.getElementById('pMsg');m.innerHTML=msg;
  m.className='prog-msg'+(isAI?' ai':'');
  document.getElementById('pSrc').textContent=src||'';
}

// Busca en Unsplash — devuelve la mejor imagen o null
async function searchUnsplash(term){
  try{
    const r=await fetch('https://api.unsplash.com/search/photos?query='+encodeURIComponent(term)+'&per_page=1&client_id='+UKEY);
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(!d.results||!d.results.length)return null;
    const p=d.results[0];
    return{url:p.urls.regular,urlFull:p.urls.full,urlJpg:p.urls.full+'&fm=jpg&q=95',urlPng:p.urls.full+'&fm=png',
      title:p.alt_description||term,author:p.user.name,isAI:false,source:'Unsplash'};
  }catch(e){return null;}
}

// Genera imagen con IA — sin timeout, espera todo lo necesario
async function generateAI(term,idx,onStatus){
  const seed=hashStr(term)+idx*1000;
  const prompt=encodeURIComponent(term+', high quality photorealistic');

  // 1. Pollinations AI — intenta sin límite de tiempo
  onStatus('Generando "'+term+'" con Pollinations AI...','Esto puede tardar 20-40 segundos...');
  const polUrl='https://image.pollinations.ai/prompt/'+prompt+'?width=800&height=600&seed='+seed+'&nologo=true&enhance=true&model=flux';
  const polOk=await waitImageForever(polUrl,60000,function(secs){
    onStatus('Generando "'+term+'" con Pollinations AI... ('+secs+'s)','Esperando respuesta...');
  });
  if(polOk)return mkPhoto(polUrl,term,'Pollinations AI',false);

  // 2. Lexica AI — búsqueda por keyword
  onStatus('Buscando "'+term+'" en Lexica AI...','');
  try{
    const r=await fetchWithTimeout('https://lexica.art/api/v1/search?q='+encodeURIComponent(term),15000);
    if(r.ok){
      const d=await r.json();
      const imgs=(d.images||[]).filter(function(x){return x.src&&x.src.startsWith('https');});
      if(imgs.length){
        const url=imgs[0].src;
        const ok=await waitImageForever(url,15000,null);
        if(ok)return mkPhoto(url,term,'Lexica AI',false);
      }
    }
  }catch(e){}

  // 3. Picsum — respaldo, foto aleatoria real
  onStatus('Usando Picsum como respaldo...','');
  const picsumUrl='https://picsum.photos/seed/'+hashStr(term)/800/600;
  return mkPhoto('https://picsum.photos/seed/'+hashStr(term)+'/800/600',term,'Picsum (respaldo)',true);
}

// Espera a que cargue una imagen sin timeout fijo, actualizando el contador
function waitImageForever(url,maxMs,onTick){
  return new Promise(function(resolve){
    const img=new Image();
    let secs=0;
    let interval=null;
    const maxTimer=setTimeout(function(){
      if(interval)clearInterval(interval);
      img.src='';resolve(false);
    },maxMs);
    if(onTick){
      interval=setInterval(function(){secs++;onTick(secs);},1000);
    }
    img.onload=function(){
      clearTimeout(maxTimer);if(interval)clearInterval(interval);resolve(true);
    };
    img.onerror=function(){
      clearTimeout(maxTimer);if(interval)clearInterval(interval);resolve(false);
    };
    img.src=url;
  });
}

async function fetchWithTimeout(url,ms){
  const ctrl=new AbortController();
  const t=setTimeout(function(){ctrl.abort();},ms);
  try{const r=await fetch(url,{signal:ctrl.signal});clearTimeout(t);return r;}
  catch(e){clearTimeout(t);throw e;}
}

function mkPhoto(url,term,source,isFallback){
  return{url,urlFull:url,urlJpg:url,urlPng:url,title:term,author:source,isAI:true,source,isFallback};
}

function hashStr(s){
  let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i)|0;return Math.abs(h)%99991;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function safeName(t){
  return(t||'foto').toLowerCase()
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i')
    .replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').substring(0,50)||'foto';
}

// Crea el item con placeholder
function addItem(term,idx,photo){
  const wrap=document.createElement('div');
  wrap.className='item'+(photo&&photo.isAI?' ai-item':'');
  wrap.style.animationDelay=(idx*.08)+'s';
  wrap.id='item_'+idx;
  wrap.innerHTML=
    '<div class="item-img" id="img_'+idx+'">'+
      '<div class="item-ph" id="ph_'+idx+'">'+
        '<div class="ph-spin"></div>'+
        '<div class="ph-name">'+esc(term)+'</div>'+
        '<div class="ph-status" id="phst_'+idx+'">Buscando...</div>'+
        '<div class="ph-source" id="phsr_'+idx+'"></div>'+
      '</div>'+
    '</div>'+
    '<div class="item-info" id="info_'+idx+'">'+
      '<div class="item-term">'+esc(term)+'</div>'+
      '<div class="item-credit" id="credit_'+idx+'">Buscando...</div>'+
      '<div class="field-sm"><div class="field-lbl">URL</div>'+
        '<div class="url-row"><span class="url-val" id="urlval_'+idx+'">—</span>'+
          '<button class="cbtn-sm" id="cbtn_'+idx+'" onclick="copyUrl('+idx+')">Copiar</button></div>'+
      '</div>'+
      '<div class="field-sm"><div class="field-lbl">HTML</div>'+
        '<div class="field-val" id="htmlval_'+idx+'">—</div>'+
      '</div>'+
      '<div class="item-btns">'+
        '<button class="btn gold" id="dlpng_'+idx+'" onclick="dlItem('+idx+',\'png\')" disabled>&#8595; .PNG</button>'+
        '<button class="btn amber" id="dljpg_'+idx+'" onclick="dlItem('+idx+',\'jpg\')" disabled>&#8595; .JPG</button>'+
      '</div>'+
    '</div>';
  document.getElementById('results').appendChild(wrap);
  return wrap;
}

function updateItemStatus(itemEl,status,source){
  const idx=itemEl.id.replace('item_','');
  const stEl=document.getElementById('phst_'+idx);
  const srEl=document.getElementById('phsr_'+idx);
  if(stEl)stEl.textContent=status;
  if(srEl)srEl.textContent=source;
}

function showItemImage(itemEl,photo){
  const idx=itemEl.id.replace('item_','');
  if(photo.isAI)itemEl.classList.add('ai-item');

  // Reemplazar placeholder con imagen real
  const imgDiv=document.getElementById('img_'+idx);
  imgDiv.innerHTML=
    '<img src="'+esc(photo.url)+'" alt="'+esc(photo.title)+'" style="width:100%;height:100%;object-fit:cover;display:block">'+
    '<div class="src-tag">'+esc(photo.source)+'</div>'+
    (photo.isAI?'<div class="ai-tag">✨ IA</div>':'');

  // Actualizar info
  document.getElementById('credit_'+idx).textContent=(photo.isAI?'✨ ':' 📷')+photo.author;
  const urlEl=document.getElementById('urlval_'+idx);
  if(urlEl)urlEl.textContent=photo.urlFull||photo.url;
  const htmlEl=document.getElementById('htmlval_'+idx);
  if(htmlEl)htmlEl.textContent='<img src="'+(photo.urlFull||photo.url)+'" alt="'+photo.title+'" style="max-width:100%">';

  // Activar botones
  const png=document.getElementById('dlpng_'+idx);
  const jpg=document.getElementById('dljpg_'+idx);
  if(png)png.disabled=false;
  if(jpg)jpg.disabled=false;

  // Guardar photo en dataset
  itemEl.dataset.url=photo.url;
  itemEl.dataset.urlFull=photo.urlFull||photo.url;
  itemEl.dataset.urlJpg=photo.urlJpg||photo.url;
  itemEl.dataset.urlPng=photo.urlPng||photo.url;
  itemEl.dataset.title=photo.title;
}

function copyUrl(idx){
  const el=document.getElementById('urlval_'+idx);
  if(!el||el.textContent==='—')return;
  navigator.clipboard.writeText(el.textContent).then(function(){
    const btn=document.getElementById('cbtn_'+idx);
    btn.textContent='✓';btn.classList.add('ok');
    setTimeout(function(){btn.textContent='Copiar';btn.classList.remove('ok');},2000);
  });
}

async function dlItem(idx,fmt){
  const item=document.getElementById('item_'+idx);
  if(!item)return;
  const btnId=fmt==='png'?'dlpng_'+idx:'dljpg_'+idx;
  const btn=document.getElementById(btnId);
  const orig=btn.textContent;btn.disabled=true;btn.textContent='...';
  const photo={url:item.dataset.url,urlFull:item.dataset.urlFull,
    urlJpg:item.dataset.urlJpg,urlPng:item.dataset.urlPng,title:item.dataset.title};
  await doDownload(photo,fmt);
  btn.textContent=orig;btn.disabled=false;
}

async function dlAll(fmt){
  const bId=fmt==='png'?'btnAllPng':'btnAllJpg';
  const oId=fmt==='png'?'btnAllJpg':'btnAllPng';
  const btn=document.getElementById(bId),other=document.getElementById(oId);
  const orig=btn.textContent;btn.disabled=true;other.disabled=true;
  let done=0;
  for(const r of allResults){
    done++;btn.textContent='Descargando '+done+'/'+allResults.length+'...';
    if(r.photo&&r.photo.url)await doDownload(r.photo,fmt);
    await new Promise(function(res){setTimeout(res,500);});
  }
  btn.textContent=orig;btn.disabled=false;other.disabled=false;
  alert('✅ '+done+' fotos descargadas en .'+fmt.toUpperCase());
}

async function doDownload(photo,fmt){
  const ext=fmt==='png'?'png':'jpg';
  const mime=fmt==='png'?'image/png':'image/jpeg';
  const name=safeName(photo.title)+'.'+ext;
  const src=fmt==='png'?(photo.urlPng||photo.url):(photo.urlJpg||photo.url);
  try{
    const r=await fetch(src);if(!r.ok)throw new Error();
    const blob=await r.blob();
    const bmp=await createImageBitmap(blob);
    const cv=document.createElement('canvas');
    cv.width=bmp.width;cv.height=bmp.height;
    const ctx=cv.getContext('2d');
    if(fmt==='jpg'){ctx.fillStyle='#fff';ctx.fillRect(0,0,bmp.width,bmp.height);}
    ctx.drawImage(bmp,0,0);
    cv.toBlob(function(ob){
      const u=URL.createObjectURL(ob);
      const a=document.createElement('a');
      a.href=u;a.download=name;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(u);},3000);
    },mime,0.95);
  }catch(e){
    const a=document.createElement('a');
    a.href=src;a.download=name;a.target='_blank';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
}

function buildExport(){
  const lines=[];
  allResults.forEach(function(r){
    if(r.photo&&r.photo.url)lines.push(r.term+': '+r.photo.url);
  });
  document.getElementById('expTa').value=lines.join('\n');
}
function toggleExp(){
  const b=document.getElementById('expBox');b.classList.toggle('on');
  if(b.classList.contains('on'))b.scrollIntoView({behavior:'smooth',block:'start'});
}
function copyUrls(){
  navigator.clipboard.writeText(document.getElementById('expTa').value).then(function(){alert('¡URLs copiadas!');});
}
updateCount();
</script>
